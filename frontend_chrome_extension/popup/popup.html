<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FareWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #070711;
      --surface:  #0F0F1E;
      --elevated: #161630;
      --blue:     #4F8EF7;
      --blue-glow:rgba(79,142,247,0.15);
      --gold:     #F5A623;
      --t1:       #EEEEFF;
      --t2:       #8B8FA8;
      --t3:       #4A4D6A;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--t1);
      width: 320px;
      padding: 0;
      overflow: hidden;
    }

    /* ── HEADER ────── */
    .popup-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--elevated);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--blue) 0%, #7B5CF8 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .logo-text span { color: var(--blue); }

    .tagline {
      font-size: 10px;
      color: var(--t2);
      margin-top: 1px;
    }

    /* ── MODE BUTTONS ────── */
    .modes {
      padding: 14px 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--t3);
      font-weight: 600;
      padding: 0 4px;
      margin-bottom: 2px;
    }

    .mode-card {
      background: var(--surface);
      border: 1px solid var(--elevated);
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
    }
    .mode-card:hover {
      background: var(--elevated);
      border-color: var(--blue-glow);
      transform: translateY(-1px);
    }
    .mode-card:active { transform: translateY(0); }

    .mode-card.products:hover { border-color: rgba(79,142,247,0.35); }
    .mode-card.travel:hover   { border-color: rgba(245,166,35,0.35); }

    .mode-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .products .mode-icon { background: rgba(79,142,247,0.12); }
    .travel   .mode-icon { background: rgba(245,166,35,0.12); }

    .mode-info { flex: 1; }
    .mode-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .products .mode-name { color: var(--blue); }
    .travel   .mode-name { color: var(--gold); }

    .mode-desc {
      font-size: 11px;
      color: var(--t2);
      line-height: 1.4;
    }

    .mode-arrow {
      color: var(--t3);
      font-size: 14px;
      transition: color 0.15s, transform 0.15s;
    }
    .mode-card:hover .mode-arrow { color: var(--t1); transform: translateX(2px); }

    /* ── DIVIDER ────── */
    .divider {
      height: 1px;
      background: var(--elevated);
      margin: 4px 12px;
    }

    /* ── QUICK ACTIONS ────── */
    .quick-actions {
      padding: 8px 12px 14px;
      display: flex;
      gap: 8px;
    }

    .quick-btn {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--elevated);
      border-radius: 8px;
      padding: 9px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, border-color 0.15s;
      color: var(--t2);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
    }
    .quick-btn:hover { background: var(--elevated); color: var(--t1); }
    .quick-btn .qb-icon { font-size: 16px; }

    /* ── STATUS STRIP ────── */
    .status-strip {
      padding: 8px 14px;
      background: var(--surface);
      border-top: 1px solid var(--elevated);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2ED47A;
      flex-shrink: 0;
    }
    .status-dot.offline { background: var(--t3); }
    .status-dot.connecting {
      background: var(--gold);
      animation: blink 1s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text {
      font-size: 10px;
      color: var(--t2);
      flex: 1;
    }

    .version-text {
      font-size: 10px;
      color: var(--t3);
    }

    /* ── SHORTCUT HINT ────── */
    .shortcut-hint {
      padding: 0 14px 10px;
      font-size: 10px;
      color: var(--t3);
      text-align: center;
    }

    kbd {
      background: var(--elevated);
      border: 1px solid var(--t3);
      border-radius: 4px;
      padding: 1px 4px;
      font-family: inherit;
      font-size: 9px;
      color: var(--t2);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="popup-header">
    <div class="logo-mark">🎯</div>
    <div>
      <div class="logo-text">Fare<span>Wise</span></div>
      <div class="tagline">See the real price. Every time.</div>
    </div>
  </div>

  <!-- MODE SELECTOR -->
  <div class="modes">
    <div class="mode-label">Open panel in mode</div>

    <div class="mode-card products" id="btn-products">
      <div class="mode-icon">📦</div>
      <div class="mode-info">
        <div class="mode-name">Products</div>
        <div class="mode-desc">Compare gadgets on Amazon &amp; Flipkart with your card offer</div>
      </div>
      <div class="mode-arrow">›</div>
    </div>

    <div class="mode-card travel" id="btn-travel">
      <div class="mode-icon">✈️</div>
      <div class="mode-info">
        <div class="mode-name">Travel</div>
        <div class="mode-desc">Compare flights on MakeMyTrip, Goibibo &amp; Cleartrip</div>
      </div>
      <div class="mode-arrow">›</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- QUICK ACTIONS -->
  <div class="quick-actions">
    <button class="quick-btn" id="btn-paste-image" title="Paste screenshot from clipboard">
      <span class="qb-icon">📋</span>
      <span>Paste Image</span>
    </button>
    <button class="quick-btn" id="btn-voice" title="Speak product or route name">
      <span class="qb-icon">🎤</span>
      <span>Voice Search</span>
    </button>
    <button class="quick-btn" id="btn-settings" title="Open settings">
      <span class="qb-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </div>

  <!-- SHORTCUT HINT -->
  <div class="shortcut-hint">
    Press <kbd>⌘</kbd><kbd>⇧</kbd><kbd>F</kbd> to toggle panel from any tab
  </div>

  <!-- STATUS -->
  <div class="status-strip">
    <div class="status-dot" id="status-dot"></div>
    <div class="status-text" id="status-text">Ready</div>
    <div class="version-text">v1.0.0</div>
  </div>

  <script>
    // ── Open side panel ─────────────────────────────────────────────
    async function openPanel(mode) {
      // Store the desired mode before opening
      chrome.storage.local.set({ pendingMode: mode });

      // Get current tab and open side panel
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      await chrome.sidePanel.open({ tabId: tab.id });

      // Close popup after opening panel
      window.close();
    }

    // ── Mode buttons ─────────────────────────────────────────────────
    document.getElementById('btn-products').addEventListener('click', () => openPanel('products'));
    document.getElementById('btn-travel').addEventListener('click',   () => openPanel('travel'));

    // ── Quick: paste image ────────────────────────────────────────────
    document.getElementById('btn-paste-image').addEventListener('click', async () => {
      await chrome.storage.local.set({ pendingMode: 'products', pendingAction: 'paste' });
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      await chrome.sidePanel.open({ tabId: tab.id });
      window.close();
    });

    // ── Quick: voice ──────────────────────────────────────────────────
    document.getElementById('btn-voice').addEventListener('click', async () => {
      await chrome.storage.local.set({ pendingAction: 'voice' });
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      await chrome.sidePanel.open({ tabId: tab.id });
      window.close();
    });

    // ── Quick: settings ───────────────────────────────────────────────
    document.getElementById('btn-settings').addEventListener('click', async () => {
      await chrome.storage.local.set({ pendingAction: 'settings' });
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      await chrome.sidePanel.open({ tabId: tab.id });
      window.close();
    });

    // ── Status check ──────────────────────────────────────────────────
    async function checkStatus() {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');

      try {
        const stored = await chrome.storage.local.get(['apiUrl']);
        const apiUrl = stored.apiUrl || 'http://localhost:8000';
        const res = await fetch(`${apiUrl}/health`, { signal: AbortSignal.timeout(2000) });

        if (res.ok) {
          dot.className  = 'status-dot';
          text.textContent = 'Backend connected';
        } else {
          throw new Error('non-200');
        }
      } catch {
        dot.className  = 'status-dot offline';
        text.textContent = 'Backend offline — demo mode';
      }
    }

    checkStatus();

    // ── Detect OS for shortcut hint ────────────────────────────────────
    const isMac = navigator.platform.toUpperCase().includes('MAC');
    if (!isMac) {
      document.querySelector('.shortcut-hint').innerHTML =
        'Press <kbd>Ctrl</kbd><kbd>Shift</kbd><kbd>F</kbd> to toggle panel from any tab';
    }
  </script>
</body>
</html>
