workflow_name: "farewise-cleartrip"
base_url: "https://www.cleartrip.com"
max_steps_default: 50
# Number of top (cheapest) filtered flights to harvest URLs for and run parallel coupons-only extraction.
offers_top_n: 2

# When true: first flight is extracted in main session (same URL not opened again); other flights open in parallel Nova sessions (one URL per session, no duplicate opens).
# When false: single session only — Book → coupons → (first: skip add-ons + fill traveler → payment fare; others: booking fare) in same tab. One Chrome; slower than parallel.
use_parallel_offers: true
max_parallel_offers: 2
collect_convenience_fee: true
convenience_fee_probe_index: 0
reuse_probe_convenience_fee: true

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR

class_codes:
  economy: Economy
  business: Business
  first: First

time_buckets:
  - label: "Early morning"
    start: "00:00"
    end: "08:00"
  - label: "Morning"
    start: "08:00"
    end: "12:00"
  - label: "Afternoon"
    start: "12:00"
    end: "16:00"
  - label: "Evening"
    start: "16:00"
    end: "20:00"
  - label: "Night"
    start: "20:00"
    end: "24:00"

steps:
  pre_filter:
    instruction_file: instructions/pre_filter_timings.md
    max_steps: 25

  extract_with_filter:
    site_adapter_file: instructions/site_adapter_cleartrip.md
    extractor_file: instructions/extract_with_filter.md

  extraction:
    site_adapter_file: instructions/site_adapter_cleartrip.md
    extractor_file: instructions/extractor_prompt.md
    schema:
      type: array
      items:
        type: object
        required:
          - airline
          - flight_number
          - departure
          - arrival
          - duration
          - stops
          - price
        additionalProperties: false
        properties:
          airline:
            type: string
          flight_number:
            type: string
          departure:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          arrival:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          duration:
            type: string
          stops:
            type: integer
            minimum: 0
          price:
            type: integer
            minimum: 0
    
  book_then_continue:
    instruction_file: instructions/book_then_continue.md
    max_steps: 25

  extract_coupons_from_booking_page:
    instruction_file: instructions/extract_coupons_from_booking_page.md
    max_steps: 25
    schema:
      type: array
      items:
        type: object
        required: [code, description, discount]
        additionalProperties: false
        properties:
          code: { type: string }
          description: { type: string }
          discount: { type: integer, minimum: 0 }

  payment_insurance_continue:
    instruction_file: instructions/payment_insurance_continue.md
    max_steps: 8

  payment_skip_addons:
    instruction_file: instructions/payment_skip_addons.md
    max_steps: 10

  payment_skip_addons_popup:
    instruction_file: instructions/payment_skip_addons_popup.md
    max_steps: 5

  payment_contact_continue:
    instruction_file: instructions/payment_contact_continue.md
    max_steps: 12

  payment_traveller_continue:
    instruction_file: instructions/payment_traveller_continue.md
    max_steps: 12

  extract_fare_breakdown:
    instruction_file: instructions/extract_fare_breakdown.md
    max_steps: 25
    schema:
      type: object
      required:
        - base_fare
        - taxes
        - convenience_fee
        - total_fare
      additionalProperties: false
      properties:
        base_fare:
          type: integer
          minimum: 0
        taxes:
          type: integer
          minimum: 0
        convenience_fee:
          type: integer
          minimum: 0
        total_fare:
          type: integer
          minimum: 0

  extract_fare_summary_booking:
    instruction_file: instructions/extract_fare_summary_booking.md
    max_steps: 25
    schema:
      type: object
      required:
        - base_fare
        - taxes
        - convenience_fee
        - total_fare
      additionalProperties: false
      properties:
        base_fare:
          type: integer
          minimum: 0
        taxes:
          type: integer
          minimum: 0
        convenience_fee:
          type: integer
          minimum: 0
        total_fare:
          type: integer
          minimum: 0
        fare_type:
          type: string
