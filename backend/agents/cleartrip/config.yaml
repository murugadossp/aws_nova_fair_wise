workflow_name: "farewise-cleartrip"
base_url: "https://www.cleartrip.com"
default_criteria: "top 5 cheapest flights"
max_steps_default: 50

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR

steps:
  wait:
    instruction: "Wait for the flight results to fully load."
  extraction:
    instruction: |
      Extract flights from this Cleartrip search results page that match: {{criteria}}.
      Return a JSON array with fields: airline, flight_number, departure (HH:MM), arrival (HH:MM), duration (Xh Ym), stops (integer), price (integer in INR, taxes included), url.
      For url: use the full absolute link (must start with {{base_url}}/) that opens the booking or flight-details page for that flight when clicked. Do not use relative paths or # fragments.
      Try to get up to 5 results. If you are running out of steps, return the flights you have collected so far (do not fail).
      Sort by price ascending. Return ONLY valid JSON array.
    schema:
      type: array
      items:
        type: object
        properties:
          airline: { type: string }
          flight_number: { type: string }
          departure: { type: string }
          arrival: { type: string }
          duration: { type: string }
          stops: { type: integer }
          price: { type: integer }
          url: { type: string }
  offers:
    instruction: |
      For the flights currently shown on this Cleartrip search results page (the ones you just extracted), find what offers or discounts are available. Collect all offer details, apply each offer one by one, and note the price for each flight after applying the offer.
      Return a JSON object with two fields: "offers_applied" (array of objects with flight_reference or airline+flight_number, offer_name, price_after_offer in INR), and "suggestion" (string recommending which offer to use and why).
      After you have the data, return your JSON and then stop; do not continue clicking.
    schema:
      type: object
      properties:
        offers_applied:
          type: array
          items:
            type: object
            properties:
              flight_reference: { type: string }
              offer_name: { type: string }
              price_after_offer: { type: integer }
        suggestion: { type: string }
