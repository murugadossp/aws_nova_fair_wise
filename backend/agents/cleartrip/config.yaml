workflow_name: "farewise-cleartrip"
base_url: "https://www.cleartrip.com"
max_steps_default: 50

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR

class_codes:
  economy: Economy
  business: Business
  first: First

time_buckets:
  - label: "Early morning"
    start: "00:00"
    end: "08:00"
  - label: "Morning"
    start: "08:00"
    end: "12:00"
  - label: "Afternoon"
    start: "12:00"
    end: "16:00"
  - label: "Evening"
    start: "16:00"
    end: "20:00"
  - label: "Night"
    start: "20:00"
    end: "24:00"

steps:
  pre_filter:
    instruction_file: instructions/pre_filter_timings.md
    max_steps: 10

  extract_with_filter:
    site_adapter_file: instructions/site_adapter_cleartrip.md
    extractor_file: instructions/extract_with_filter.md

  extraction:
    site_adapter_file: instructions/site_adapter_cleartrip.md
    extractor_file: instructions/extractor_prompt.md
    schema:
      type: array
      items:
        type: object
        required:
          - airline
          - flight_number
          - departure
          - arrival
          - duration
          - stops
          - price
        additionalProperties: false
        properties:
          airline:
            type: string
          flight_number:
            type: string
          departure:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          arrival:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          duration:
            type: string
          stops:
            type: integer
            minimum: 0
          price:
            type: integer
            minimum: 0
    
  offers:
    instruction_file: instructions/offers.md
    schema:
      type: object
      properties:
        offers_applied:
          type: array
          items:
            type: object
            properties:
              flight_reference: { type: string }
              offer_name: { type: string }
              price_after_offer: { type: integer }
        suggestion: { type: string }
