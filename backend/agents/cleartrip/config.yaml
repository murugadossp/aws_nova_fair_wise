workflow_name: "farewise-cleartrip"
base_url: "https://www.cleartrip.com"
default_criteria: "top 5 cheapest flights"
max_steps_default: 50

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR

steps:
  extraction:
    site_adapter_file: instructions/site_adapter_cleartrip.md
    extractor_file: instructions/extractor_prompt.md
    schema:
      type: array
      items:
        type: object
        required:
          - airline
          - flight_number
          - departure
          - arrival
          - duration
          - stops
          - price
          - url
        additionalProperties: false
        properties:
          airline:
            type: string
          flight_number:
            type: string
          departure:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          arrival:
            type: string
            pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$"
          duration:
            type: string
            pattern: "^[0-9]+h [0-9]+m$"
          stops:
            type: integer
            minimum: 0
          price:
            type: integer
            minimum: 0
          url:
            type: string
            # {{base_url}} is substituted at runtime (and regex-escaped) before schema is sent to Nova Act
            pattern: "^{{base_url}}/.*"
    
  offers:
    instruction_file: instructions/offers.md
    schema:
      type: object
      properties:
        offers_applied:
          type: array
          items:
            type: object
            properties:
              flight_reference: { type: string }
              offer_name: { type: string }
              price_after_offer: { type: integer }
        suggestion: { type: string }
