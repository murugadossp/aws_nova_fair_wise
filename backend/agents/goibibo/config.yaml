workflow_name: "farewise-goibibo"
base_url: "https://www.goibibo.com"
default_criteria: "top 5 cheapest flights"
max_steps_default: 50

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR
  bhubaneswar: BBI
  nagpur: NAG
  coimbatore: CJB
  visakhapatnam: VTZ
  vizag: VTZ

steps:
  wait:
    instruction: "Wait for flight results to load completely."
  extraction:
    instruction: |
      Extract flights from this Goibibo page that match: {{criteria}}.
      Return a JSON array with fields: airline, flight_number, departure (HH:MM), arrival (HH:MM), duration (Xh Ym), stops (integer), price (integer INR), url.
      For url: use the full absolute link (must start with {{base_url}}/) that opens the booking or flight-details page for that flight when clicked. Do not use relative paths or # fragments.
      Try to get up to 5 results. If you are running out of steps, return the flights you have collected so far (do not fail).
      Sort by price ascending. Return ONLY valid JSON.
    schema:
      type: array
      items:
        type: object
        properties:
          airline: { type: string }
          flight_number: { type: string }
          departure: { type: string }
          arrival: { type: string }
          duration: { type: string }
          stops: { type: integer }
          price: { type: integer }
          url: { type: string }
