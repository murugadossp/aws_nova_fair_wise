workflow_name: "farewise-ixigo"
base_url: "https://www.ixigo.com"
max_steps_default: 50

class_codes:
  economy: e
  business: b
  premium_economy: p
  first: f

city_codes:
  mumbai: BOM
  delhi: DEL
  bangalore: BLR
  bengaluru: BLR
  hyderabad: HYD
  chennai: MAA
  kolkata: CCU
  pune: PNQ
  ahmedabad: AMD
  goa: GOI
  jaipur: JAI
  kochi: COK
  cochin: COK
  lucknow: LKO
  chandigarh: IXC
  indore: IDR
  bhubaneswar: BBI
  nagpur: NAG
  coimbatore: CJB
  visakhapatnam: VTZ
  vizag: VTZ
  patna: PAT
  srinagar: SXR
  amritsar: ATQ
  varanasi: VNS
  leh: IXL
  aurangabad: IXU

time_buckets:
  # Boundaries verified against Ixigo URL params:
  #   takeOff=EARLY_MORNING → before 06:00
  #   takeOff=MORNING       → 06:00–11:59
  #   takeOff=AFTERNOON     → 12:00–15:59
  #   takeOff=EVENING       → 16:00–19:59
  #   takeOff=NIGHT         → 20:00–23:59
  - label: "Early morning"
    start: 0
    end: 360        # 00:00–05:59
    ixigo_value: "EARLY_MORNING"
  - label: "Morning"
    start: 360      # 06:00
    end: 720        # 11:59
    ixigo_value: "MORNING"
  - label: "Afternoon"
    start: 720      # 12:00
    end: 960        # 15:59
    ixigo_value: "AFTERNOON"
  - label: "Evening"
    start: 960      # 16:00
    end: 1200       # 19:59
    ixigo_value: "EVENING"
  - label: "Night"
    start: 1200     # 20:00
    end: 1440       # 23:59
    ixigo_value: "NIGHT"

# Wait for results: null = static 4s sleep only (selector approach removed — [data-testid='pricing'] is not present on Ixigo results page).
wait_for_selector: null
wait_for_selector_timeout_ms: 4000

offers_top_n: 5
offers_parallel: true
max_parallel_offers: 2
convenience_fee: 449
min_flights_expected: 5  # warn + retry if Phase 1 extracts fewer than this

steps:
  extraction:
    instruction_file: "instructions/wait_and_extract.md"
    schema:
      type: array
      items:
        type: object
        required:
          - airline
          - flight_number
          - departure
          - arrival
          - duration
          - stops
          - price
        additionalProperties: false
        properties:
          airline:       { type: string }
          flight_number: { type: string }
          departure:     { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
          arrival:       { type: string, pattern: "^([01][0-9]|2[0-3]):[0-5][0-9]$" }
          duration:      { type: string }
          stops:         { type: integer, minimum: 0 }
          price:         { type: integer, minimum: 0 }
          book_url:      { type: string }
          fare_details:
            type: object
            required: [base_fare, taxes]
            properties:
              base_fare: { type: integer, minimum: 0 }
              taxes:     { type: integer, minimum: 0 }
              total:     { type: integer, minimum: 0 }
  book_then_continue:
    instruction_file: "instructions/book_then_continue.md"
    max_steps: 50
  extract_coupons_from_booking_page:
    instruction_file: "instructions/extract_coupons_from_booking_page.md"
    max_steps: 50
    schema:
      type: object
      required: [fare_details, coupons]
      properties:
        fare_details:
          type: object
          required: [base_fare, taxes, total]
          properties:
            base_fare: { type: integer, minimum: 0 }
            taxes:     { type: integer, minimum: 0 }
            total:     { type: integer, minimum: 0 }
        coupons:
          type: array
          items:
            type: object
            required: [code, description, discount]
            properties:
              code:        { type: string }
              description: { type: string }
              discount:    { type: integer, minimum: 0 }